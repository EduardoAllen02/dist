  <body>
    <!-- ANTES de <script src="player.js"> -->
<script>
  window.__isFloorPlan = false;

  // Bloquea la carga dinámica del floor-navigator desde GitHub Pages.
  // Los pines embebidos en Rowi llaman load() que inyecta script/link apuntando
  // a eduardoallen02.github.io — los archivos ya están cargados localmente.
  (function() {
    var _origAppendChild = Node.prototype.appendChild;
    Node.prototype.appendChild = function(child) {
      if (child && child.src && child.src.indexOf('eduardoallen02.github.io') !== -1) {
        return child;
      }
      if (child && child.href && child.href.indexOf('eduardoallen02.github.io') !== -1) {
        return child;
      }
      return _origAppendChild.call(this, child);
    };
  })();

  var _origAEL = EventTarget.prototype.addEventListener;
  EventTarget.prototype.addEventListener = function(type, handler, options) {
    if (type === 'pointermove') {
      var _orig = handler;
      handler = function(e) {
        if (window.__isFloorPlan) {
          var canvas = document.querySelector('#player canvas');
          if (canvas) {
            var rect = canvas.getBoundingClientRect();
            var cx = rect.left + rect.width  / 2;
            var cy = rect.top  + rect.height / 2;
            var ox = e.clientX;
            var oy = e.clientY;
            var mx = e.movementX;
            var my = e.movementY;
            // Invertir posición absoluta Y delta de movimiento
            Object.defineProperty(e, 'clientX',   { get: function(){ return 2*cx - ox; }, configurable: true });
            Object.defineProperty(e, 'clientY',   { get: function(){ return 2*cy - oy; }, configurable: true });
            Object.defineProperty(e, 'movementX', { get: function(){ return -mx; },       configurable: true });
            Object.defineProperty(e, 'movementY', { get: function(){ return -my; },       configurable: true });
          }
        }
        return _orig.call(this, e);
      };
    }
    return _origAEL.call(this, type, handler, options);
  };
</script>
    <link rel="stylesheet" href="floor-navigator.css">
    <script src="player.js"></script>
    <script src="floor-navigator.js"></script>
    <div class="player" id="player"></div>
    <script>
      var getRightBoolean = function(value) {
        if (value === 'true') {
          return true
        }
        if (value === 'false') {
          return false
        }
        return value
      }
      var getRightUndefined = function(value) {
        return value === undefined ? true : value
      }
      var getRightArray = function(value) {
        return typeof value === 'string' && value.indexOf(',') > -1
          ? value.split(',')
          : value
      }
      var getRightOptionValue = function(name, value) {
        value = getRightArray(value)
        value = getRightBoolean(value)
        value = getRightUndefined(value)
        return value
      }
      var getRightOptionName = function(name) {
        var aliases = {
          u: 'isMLS',
          debug: 'isDebug',
          'start-help': 'isStartHelp',
          'dynamic-focus': 'isDynamicFocus',
          'attraction-mode': 'isAttractionMode',
          mesh: 'tour',
          'content-path': 'contentPathPrefix',
          'user-regions': 'generateUserRegions',
          'atlas-mipmap': 'atlasMipmap',
          'show-bbox': 'showBBox',
          'splash-path': 'splashPath',
          'texture-quality': 'textureQuality',
          'tile-min-lod': 'tileMinLod',
          'tile-max-lod': 'tileMaxLod',
          'manual-start': 'manualStart',
        }
        return aliases[name] ? aliases[name] : name
      }
      var isDebugOptionName = function(name) {
        return name.indexOf('Debug.') === 0
      }
      var isConfigOptionName = function(name) {
        return name.indexOf('config.') === 0
      }

      var options = {
        dangerouslyRunUserScripts: true,
      }
      var debugOptions = {}
      var configOptions = {}
      var params = window.location.search.substring(1).split('&')

      for (var i = 0; i < params.length; i++) {
        var pair = params[i].split('=')
        var optionName = pair[0]
        if (optionName.length > 0) {
          var optionValue = pair[1]
          optionName = getRightOptionName(optionName)
          optionValue = decodeURIComponent(optionValue)
          optionValue = getRightOptionValue(optionName, optionValue)
          if (isDebugOptionName(optionName)) {
            debugOptions[optionName.replace('Debug.', '')] = optionValue
          } else if (isConfigOptionName(optionName)) {
            var v = optionValue
            if (v !== true && v !== false && !isNaN(+v)) {
              optionValue = +v
            }
            configOptions[optionName.replace('config.', '')] = optionValue
          } else {
            options[optionName] = optionValue
          }
        }
      }

      if ('defaultCameraDirection' in options) {
        try {
          options['defaultCameraDirection'] = JSON.parse(
            options['defaultCameraDirection']
          )
          if (options['defaultCameraDirection'].length !== 3) {
            throw new Error()
          }
        } catch (e) {
          console.warn(
            'The default-camera-direction parameter has to be an array. For example: "default-camera-direction:[0,0,1]"'
          )
        }
      }

      var playerElement = document.getElementById('player')

      window.player = new GCVPlayer(
        playerElement,
        options,
        debugOptions,
        configOptions
      )
window.player.ready(function() {
  var canvas = document.querySelector('#player canvas');
  if (!canvas) return;

  function enterFloorPlan() {
    window.__isFloorPlan = true;
    canvas.style.transition = 'transform 0.4s ease';
    canvas.style.transform  = 'rotate(180deg)';
  }

  function exitFloorPlan() {
    window.__isFloorPlan = false;
    canvas.style.transition = 'transform 0.4s ease';
    canvas.style.transform  = 'none';
  }

  var interval = setInterval(function() {
    var walkingBtn = document.querySelector('span[title="Walking Mode"]');
    var btn3D      = document.querySelector('span[title="3D Mode"]');
    var floorBtn   = document.querySelector('span[title="Floor Plan Mode"]');
    if (!walkingBtn || !btn3D || !floorBtn) return;
    clearInterval(interval);

    // Clicks en botones
    floorBtn.addEventListener('click',   enterFloorPlan);
    walkingBtn.addEventListener('click', exitFloorPlan);
    btn3D.addEventListener('click',      exitFloorPlan);

    // Observer: detecta cambio de clase en cualquier botón
    var observer = new MutationObserver(function() {
      if (!window.__isFloorPlan) return;

      // Si walking se activa por cualquier método (pin, doble click, etc)
      var walkIsActive  = walkingBtn.className.includes('css-1yar5nb');
      var floorIsActive = floorBtn.className.includes('css-1nmeqo3');

      if (!floorIsActive && walkIsActive) {
        exitFloorPlan();
      }
    });

    [walkingBtn, btn3D, floorBtn].forEach(function(btn) {
      observer.observe(btn, { attributes: true, attributeFilter: ['class'] });
    });

  }, 200);
});
    </script>
  </body>
</html>
