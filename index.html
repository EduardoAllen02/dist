<!DOCTYPE html>
<html>
  <head>
    <title>Viewer</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <style>
      html {
        width: 100%;
        height: 100%;
      }
      .player {
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        top: 0;
      }
    </style>
  </head>
  <body>
    <!-- ANTES de <script src="player.js"> -->
<script>
  // Blocks dynamic loading of floor-navigator from GitHub Pages.
  (function() {
    var _origAppendChild = Node.prototype.appendChild;
    Node.prototype.appendChild = function(child) {
      if (child && child.src && child.src.indexOf('eduardoallen02.github.io') !== -1 && child.src.indexOf('floor-navigator') !== -1) {
        return child;
      }
      if (child && child.href && child.href.indexOf('eduardoallen02.github.io') !== -1 && child.href.indexOf('floor-navigator') !== -1) {
        return child;
      }
      return _origAppendChild.call(this, child);
    };
  })();
</script>
    <link rel="stylesheet" href="floor-navigator.css">
    <script src="bridge.js"></script>
    <script src="player.js"></script>
    <script src="floor-navigator.js"></script>
    <div class="player" id="player"></div>
    <script>
      var getRightBoolean = function(value) {
        if (value === 'true') {
          return true
        }
        if (value === 'false') {
          return false
        }
        return value
      }
      var getRightUndefined = function(value) {
        return value === undefined ? true : value
      }
      var getRightArray = function(value) {
        return typeof value === 'string' && value.indexOf(',') > -1
          ? value.split(',')
          : value
      }
      var getRightOptionValue = function(name, value) {
        value = getRightArray(value)
        value = getRightBoolean(value)
        value = getRightUndefined(value)
        return value
      }
      var getRightOptionName = function(name) {
        var aliases = {
          u: 'isMLS',
          debug: 'isDebug',
          'start-help': 'isStartHelp',
          'dynamic-focus': 'isDynamicFocus',
          'attraction-mode': 'isAttractionMode',
          mesh: 'tour',
          'content-path': 'contentPathPrefix',
          'user-regions': 'generateUserRegions',
          'atlas-mipmap': 'atlasMipmap',
          'show-bbox': 'showBBox',
          'splash-path': 'splashPath',
          'texture-quality': 'textureQuality',
          'tile-min-lod': 'tileMinLod',
          'tile-max-lod': 'tileMaxLod',
          'manual-start': 'manualStart',
        }
        return aliases[name] ? aliases[name] : name
      }
      var isDebugOptionName = function(name) {
        return name.indexOf('Debug.') === 0
      }
      var isConfigOptionName = function(name) {
        return name.indexOf('config.') === 0
      }

      var options = {
        dangerouslyRunUserScripts: true,
      }
      var debugOptions = {}
      var configOptions = {}
      var params = window.location.search.substring(1).split('&')

      for (var i = 0; i < params.length; i++) {
        var pair = params[i].split('=')
        var optionName = pair[0]
        if (optionName.length > 0) {
          var optionValue = pair[1]
          optionName = getRightOptionName(optionName)
          optionValue = decodeURIComponent(optionValue)
          optionValue = getRightOptionValue(optionName, optionValue)
          if (isDebugOptionName(optionName)) {
            debugOptions[optionName.replace('Debug.', '')] = optionValue
          } else if (isConfigOptionName(optionName)) {
            var v = optionValue
            if (v !== true && v !== false && !isNaN(+v)) {
              optionValue = +v
            }
            configOptions[optionName.replace('config.', '')] = optionValue
          } else {
            options[optionName] = optionValue
          }
        }
      }

      if ('defaultCameraDirection' in options) {
        try {
          options['defaultCameraDirection'] = JSON.parse(
            options['defaultCameraDirection']
          )
          if (options['defaultCameraDirection'].length !== 3) {
            throw new Error()
          }
        } catch (e) {
          console.warn(
            'The default-camera-direction parameter has to be an array. For example: "default-camera-direction:[0,0,1]"'
          )
        }
      }

      var playerElement = document.getElementById('player')

      window.player = new GCVPlayer(
        playerElement,
        options,
        debugOptions,
        configOptions
      )
window.player.ready(function() {

  /* ════════════════════════════════════════════════════════════════════
   *  PRE-ROTATION CONFIG
   *  Antes de entrar al floorplan, la cámara gira hacia ALIGN_ANGLE_X.
   *
   *  Cómo calibrar ALIGN_ANGLE_X:
   *    1. Abre el tour en modo walk y gira hasta mirar hacia la dirección
   *       que corresponde a "arriba" en el plano (en este tour: sur).
   *    2. Abre la consola del navegador y ejecuta:
   *         window.player.Api().Camera.get().then(s => console.log(s.angles.x))
   *    3. Pon ese valor en ALIGN_ANGLE_X.
   * ════════════════════════════════════════════════════════════════════ */
  var ALIGN_ANGLE_X  = 0;     // ← CALIBRAR: azimut hacia "arriba" del plano
  var ALIGN_ANGLE_Y  = 0;     // sin inclinación vertical
  var TRANSITION_MS  = 1100;  // ms de espera para la rotación (≥ transition_time_max)

  var api     = window.player.Api();
  var GCV     = api.Common.getBowels().GCV;
  var skipPre = false;

  /* ── Espera botones del player ────────────────────────────────────── */
  var interval = setInterval(function() {
    var walkingBtn = document.querySelector('span[title="Walking Mode"]');
    var floorBtn   = document.querySelector('span[title="Floor Plan Mode"]');
    if (!walkingBtn || !floorBtn) return;
    clearInterval(interval);

    /* ── Interceptor capture-phase: rota cámara antes del floorplan ── */
    floorBtn.addEventListener('click', function(e) {
      if (skipPre) { skipPre = false; return; }

      var mode = GCV.Camera.currentMode && GCV.Camera.currentMode.name;
      var walkActive = walkingBtn.className.includes('css-1yar5nb');
      if (mode !== 'CAMERA_MODES/INSIDE' && !walkActive) return;

      e.stopImmediatePropagation();

      api.Camera.set({
        cameraMode:      'CAMERA_MODES/INSIDE',
        panoramaId:      String(GCV.Panoramas.activeId),
        angles:          { x: ALIGN_ANGLE_X, y: ALIGN_ANGLE_Y },
        transitionStyle: 'TRANSITION_STYLES/FLY',
      });

      setTimeout(function() {
        skipPre = true;
        floorBtn.click();
      }, TRANSITION_MS);

    }, true);

  }, 200);
});
    </script>
  </body>
</html>
